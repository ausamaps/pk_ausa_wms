  <meta name="theme-color" content="#0d1526">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f5f5f5; }
    #root { display:flex; flex-direction:column; height:100vh; }
    #header { position:fixed; top:0; left:0; right:0; background:#0d1526; padding:0 16px; height:48px; display:flex; align-items:center; justify-content:space-between; z-index:2000; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.4); }
    #header-title { font-size:13px; font-weight:600; color:#f0a500; letter-spacing:0.08em; text-transform:uppercase; }
    #map { flex:1; width:100%; position:relative; margin-top:48px; }

    #gps-btn { position:fixed; bottom:230px; right:14px; z-index:1000; width:48px; height:48px; border-radius:50%; background:#fff; border:none; color:#0066ff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.25); -webkit-tap-highlight-color:transparent; transition:transform 0.1s; }
    #gps-btn:active { transform:scale(0.92); }
    #gps-btn.locating { animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 2px 12px rgba(0,0,0,0.25)} 50%{box-shadow:0 2px 20px rgba(0,102,255,0.5)} }

    #popup-panel { position:absolute; bottom:0; left:0; right:0; z-index:1000; background:#fff; border-top:1px solid #e0e0e0; border-radius:20px 20px 0 0; padding:0 20px 36px; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow:0 -4px 24px rgba(0,0,0,0.12); }
    #popup-panel.visible { transform:translateY(0); }
    #popup-handle { width:36px; height:4px; background:#e0e0e0; border-radius:2px; margin:12px auto 16px; }
    #popup-close { position:absolute; top:14px; right:18px; background:none; border:none; color:#999; font-size:24px; cursor:pointer; padding:4px; line-height:1; -webkit-tap-highlight-color:transparent; }
    #pk-value { font-size:38px; font-weight:800; color:#0066ff; letter-spacing:0.02em; margin-bottom:2px; }
    #pk-label { font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:#999; margin-bottom:16px; }
    .info-row { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid #f0f0f0; }
    .info-row:last-child { border-bottom:none; }
    .info-icon { font-size:18px; width:26px; flex-shrink:0; margin-top:1px; }
    .info-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#999; margin-bottom:2px; }
    .info-value { font-size:15px; font-weight:600; color:#1a1a2e; }

    #status { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:999; background:rgba(0,0,0,0.7); border-radius:20px; padding:6px 14px; font-size:12px; color:#fff; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity 0.3s; }
    #status.visible { opacity:1; }

    .leaflet-popup { display:none !important; }
    .leaflet-control-container { display:none !important; }

    /* Sin esto, Leaflet le pone su clase default .leaflet-div-icon
       (fondo blanco + borde) al ícono de ubicación y se ve como un cuadrado */
    .loc-lollipop { pointer-events:none !important; }

    #zoom-buttons {
      position:fixed;
      right:14px;
      bottom:120px;
      display:flex;
      flex-direction:column;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 2px 14px rgba(0,0,0,0.25);
      z-index:1000;
      background:#fff;
    }
    #zoom-buttons button {
      width:48px; height:48px;
      background:#fff;
      color:#0066ff;
      border:none;
      font-size:28px;
      font-weight:700;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      padding:0;
      transition:background 0.1s;
    }
    #zoom-in { border-bottom:1px solid #e0e0e0; }
    #zoom-buttons button:hover { background:#f5f9ff; }
    #zoom-buttons button:active { background:#f0f4ff; }

    #zoom-indicator-side {
      position:fixed;
      right:14px;
      bottom:72px;
      background:#fff;
      border-radius:8px;
      padding:8px;
      width:48px;
      text-align:center;
      font-size:16px;
      font-weight:700;
      color:#0066ff;
      box-shadow:0 2px 14px rgba(0,0,0,0.25);
      pointer-events:none;
      z-index:1000;
    }
  </style>
</head>

}

// GetFeatureInfo con parámetros de MapStore
function getFeatureInfo(latlng) {
  const bounds = map.getBounds();
  
  // Convertir a EPSG:3857 (Web Mercator) como MapStore
  function latLngToWebMercator(lat, lng) {
    const x = lng * 20037508.34 / 180;
    const y = Math.log(Math.tan((90 + lat) * Math.PI / 360)) * 20037508.34 / Math.PI;
    return [x, y];
  }
  
  const sw = latLngToWebMercator(bounds.getSouth(), bounds.getWest());
  const ne = latLngToWebMercator(bounds.getNorth(), bounds.getEast());
  
  const bbox = `${sw[0]},${sw[1]},${ne[0]},${ne[1]}`;
  const width = 101;
  const height = 101;
  const x = Math.round(width / 2);
  const y = Math.round(height / 2);
  
  const url = `${WMS_URL}?service=WMS&version=1.1.1&request=GetFeatureInfo&layers=ausa:v_progresivas_mobile&query_layers=ausa:v_progresivas_mobile&styles=ausa:sld_pk_mobile&x=${x}&y=${y}&height=${height}&width=${width}&srs=EPSG:3857&bbox=${bbox}&feature_count=10&info_format=text/plain&format=image/png`;
  
  showStatus('Buscando...', 0);
  
  fetch(url)
    .then(res => res.text())
    .then(text => {
      console.log('GetFeatureInfo raw response:', text);
      
      // Parse la respuesta de texto plano
      const lines = text.split('\n');
      let pk = null;
      let nom_tramo = null;
      
      for (let line of lines) {
        if (line.includes('pk') && line.includes('=')) {
          const match = line.match(/pk\s*=\s*(.+?)(?=\n|$)/);
          if (match) pk = match[1].trim();
        }
        if (line.includes('nom_tramo') && line.includes('=')) {
          const match = line.match(/nom_tramo\s*=\s*(.+?)(?=\n|$)/);
          if (match) nom_tramo = match[1].trim();
        }
      }
      
      console.log('Parsed - PK:', pk, 'Tramo:', nom_tramo);
      
      if (pk && nom_tramo) {
        showPanel({ pk, nom_tramo });
        statusEl.classList.remove('visible');
      } else {
        showStatus('No encontrado', 2000);
      }
    })
    .catch(err => {
      console.error('GetFeatureInfo error:', err);
      showStatus('Error en la búsqueda', 2000);
    });
}

// Click en el mapa - solo llamar getFeatureInfo
map.on('click', (e) => {
  closePanel();
  getFeatureInfo(e.latlng);
});

function updateZoom() {
  currentZoom = map.getZoom();
  document.getElementById('zoom-indicator-side').textContent = currentZoom;
}

map.on('zoomend', () => { updateZoom(); closePanel(); });
map.whenReady(updateZoom);

// Panel
const panel = document.getElementById('popup-panel');

function closePanel() {
  panel.classList.remove('visible');
}

document.getElementById('popup-close').onclick = closePanel;

function showPanel(p) {
  document.getElementById('pk-value').textContent = p.pk;
  document.getElementById('info-tramo').textContent = p.nom_tramo;
  panel.classList.add('visible');
}

// GPS
document.getElementById('gps-btn').addEventListener('click', function() {
  this.classList.add('locating');
  showStatus('Buscando ubicación...', 0);
  
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude:lat, longitude:lng} = pos.coords;
    if(locMarker) map.removeLayer(locMarker);
    if(locCircle) map.removeLayer(locCircle);
    
    const locIcon = L.divIcon({
      html: `<svg width="32" height="50" viewBox="0 0 32 50" xmlns="http://www.w3.org/2000/svg">
        <line x1="16" y1="20" x2="16" y2="50" stroke="#D8A8A8" stroke-width="3" stroke-linecap="round"/>
        <circle cx="16" cy="12" r="10" fill="#E8C8C8" stroke="#D8A8A8" stroke-width="2"/>
      </svg>`,
      iconSize: [32, 50],
      iconAnchor: [16, 50],
      className: 'loc-lollipop'
    });
    locCircle = L.marker([lat,lng], {icon: locIcon}).addTo(map);
    map.flyTo([lat,lng], 17, { animate:true, duration:1.8 });
    this.classList.remove('locating');
    statusEl.classList.remove('visible');
  }, () => {
    this.classList.remove('locating');
    showStatus('No se pudo obtener ubicación', 3000);
  }, {enableHighAccuracy:true, timeout:10000});
});

// Zoom buttons
document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn());
document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => {
        showStatus('Instalado offline', 2000);
      })
      .catch(() => {});
  });
}
</script>
